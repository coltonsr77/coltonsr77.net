<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>WTViewer Download</title>
    <style>
        body { font-family: Arial, sans-serif; background: #111; color: #eee; margin: 0; padding: 20px; }
        h1 { color: #7fdc7f; }
        label { display: block; margin: 12px 0 4px; }
        select, input[type=text], input[type=button] { width: 100%; max-width: 420px; padding: 8px; margin-bottom: 8px; }
        .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .row > * { flex: 1; min-width: 200px; }
        .checkbox-row { display: flex; gap: 14px; flex-wrap: wrap; }
        .note { font-size: 0.9rem; color: #aaa; }
    </style>
    <script>
        function getSSIDCRC(ssid) {
            let crc = 0;
            ssid = ssid.slice(0, 14);
            for (let i = 0; i < ssid.length; i += 2) {
                let inbyte = parseInt(ssid.slice(i, i + 2), 16);
                for (let ii = 8; ii > 0; ii--) {
                    let mix = (crc ^ inbyte) & 0x01;
                    crc >>= 1;
                    if (mix !== 0) crc ^= 0x8C;
                    inbyte >>= 1;
                }
                if (isNaN(crc)) crc = 0;
            }
            let out = crc.toString(16);
            return out.length === 1 ? "0" + out : out;
        }

        function generateSSID() {
            let ssid = "91xxxxxxaeb002";
            while (ssid.indexOf("x") !== -1) {
                ssid = ssid.replace("x", Math.floor(Math.random() * 16).toString(16));
            }
            document.getElementById('client_ssid').value = ssid + getSSIDCRC(ssid);
        }

        function validateSSID(ssid) {
            if (ssid.length !== 16) {
                alert("Please choose a valid SSID and try again.");
                return false;
            }
            if ((ssid.slice(0, 1) !== "0" && ssid.slice(0, 1) !== "8" && ssid.slice(0, 1) !== "9") ||
                ssid.slice(6, 7) !== "0" ||
                ssid.slice(9, 14) !== "0b002") {
                alert("Your SSID is not proper, but I'll allow it.");
            }
            return true;
        }

        function toggleRandomizer(checkbox) {
            const ssid = document.getElementById('client_ssid');
            const gen = document.getElementById('generate_ssid');
            ssid.disabled = checkbox.checked;
            gen.disabled = checkbox.checked;
        }

        function fixFormAction() {
            const form = document.getElementById('viewergen');
            let actionPath = window.location.pathname;
            if (actionPath.endsWith('index.html')) {
                actionPath = actionPath.slice(0, -10);
            }
            if (!actionPath.endsWith('/')) {
                actionPath = actionPath.substring(0, actionPath.lastIndexOf('/') + 1);
            }
            form.action = actionPath + 'index.js';
        }

        function submitForm() {
            const ssidField = document.getElementById('client_ssid');
            if (!document.getElementById('random_ssid').checked) {
                if (!validateSSID(ssidField.value)) return;
            }
            document.getElementById('viewergen').submit();
        }

        window.addEventListener('DOMContentLoaded', fixFormAction);
    </script>
</head>
<body>
    <h1>WTViewer Download</h1>
    <p class="note">This page submits directly to <code>index.js</code> and uses the same viewer generation backend.</p>
    <form id="viewergen" method="GET" action="index.js">
        <label for="viewer">Viewer Version</label>
        <select name="viewer" id="viewer">
            <option value="0">WebTV Viewer v1.0 Build 146 (w/ B210 ROMs)</option>
            <option value="1">WebTV Viewer v1.1 Build 220</option>
            <option value="2">WebTV Viewer v2.5 Build 117</option>
            <option value="3">WebTV Viewer v1.0 Build 210 (Hackers Edition)</option>
            <option value="4" selected>WebTV Viewer v2.5 Build 117 (Hackers Edition)</option>
        </select>

        <label for="client_ssid">SSID</label>
        <div class="row">
            <input type="text" id="client_ssid" name="client_ssid" maxlength="16" value="91" disabled>
            <input type="button" id="generate_ssid" value="Randomize SSID" onclick="generateSSID()" disabled>
        </div>
        <p class="note">Viewer clients should use SSIDs starting with <strong>91</strong>, unless you are intentionally spoofing a box.</p>

        <label for="logo">Startup Logo</label>
        <select name="logo" id="logo">
            <option value="0" selected>WebTV Viewer Default</option>
            <option value="1">SuperViewer 4.0</option>
            <option value="2">WebTV Viewer Hacker's Edition</option>
        </select>

        <label for="diskset">Disk Set</label>
        <select name="diskset" id="diskset">
            <option value="0" selected>WebTV Viewer Default</option>
        </select>

        <label for="build">Build Spoof</label>
        <select name="build" id="build">
            <option value="1235">Build 1235 (Old Classic)</option>
            <option value="71810">Build 7181 (Old Classic)</option>
            <option value="7253">Build 7253 (Old Plus Derby)</option>
            <option value="7181" selected>Build 7181 (Old Plus Recommended)</option>
            <option value="16276">Build 16276 (Old Plus)</option>
            <option value="17015">Build 17015 (Dish-Echostar)</option>
            <option value="5792">Build 5792 (New Plus LC2.5)</option>
            <option value="57920">Build 5792 (New Classic bps)</option>
            <option value="28220">Build 28220 (Ultimate TV)</option>
            <option value="5254">Sega DreamCast</option>
        </select>

        <div class="checkbox-row">
            <label><input type="checkbox" name="random_ssid" id="random_ssid" checked onchange="toggleRandomizer(this)"> Let the server choose the SSID</label>
            <label><input type="checkbox" name="viewer_only"> Viewer only (no ROMs or logos)</label>
        </div>

        <div style="margin-top: 18px;">
            <input type="button" value="Download Viewer" onclick="submitForm()">
        </div>
    </form>
</body>
</html>
